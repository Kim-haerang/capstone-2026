<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>스마트 얼룩 제거기 - 개발자 화면</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:linear-gradient(180deg,#020617 0%,#111827 100%);color:var(--text)}
.wrap{max-width:1280px;margin:0 auto;padding:20px;display:grid;gap:18px}
.panel{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:22px;padding:18px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.title{font-size:24px;font-weight:900}
.sub{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
button{border:none;border-radius:14px;padding:11px 16px;font-size:14px;font-weight:900;cursor:pointer;background:#1e293b;color:#e5e7eb}
button.primary{background:#0ea5e9;color:#082f49}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.row{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:8px 0;border-bottom:1px solid rgba(51,65,85,.55)}
.key{color:var(--muted);font-weight:800}
.val{word-break:break-word}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#0b1220;font-size:12px;color:#cbd5e1;font-weight:800}
.log{display:grid;gap:8px;max-height:420px;overflow:auto}
.log-item{border:1px solid var(--line);background:#0b1220;border-radius:14px;padding:10px 12px;font-size:12px;color:#cbd5e1}
pre{margin:0;white-space:pre-wrap;font-size:12px;color:#cbd5e1}
@media(max-width:900px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <section class="panel">
    <div class="top">
      <div>
        <div class="title">개발자 화면</div>
        <div class="sub">최신 분석 결과, 촬영 상태, 내부 로그를 확인합니다.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="location.href='/'">사용자 화면</button>
        <button class="primary" id="refreshBtn">새로고침</button>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="badges">
      <div class="badge">현재 단계: <span id="stageBadge">-</span></div>
      <div class="badge">택 입력 방식: <span id="tagModeBadge">-</span></div>
      <div class="badge">택 촬영: <span id="tagShotBadge">-</span></div>
      <div class="badge">1차 촬영: <span id="beforeShotBadge">-</span></div>
      <div class="badge">2차 촬영: <span id="afterShotBadge">-</span></div>
      <div class="badge">세척 후 촬영: <span id="feedbackShotBadge">-</span></div>
    </div>
  </section>

  <section class="grid">
    <section class="panel">
      <div class="row"><div class="key">최종 라벨</div><div class="val" id="finalLabel">-</div></div>
      <div class="row"><div class="key">판단 방식</div><div class="val" id="decisionSource">-</div></div>
      <div class="row"><div class="key">신뢰도</div><div class="val" id="confidence">-</div></div>
      <div class="row"><div class="key">CNN before</div><div class="val" id="beforeCnn">-</div></div>
      <div class="row"><div class="key">CNN after</div><div class="val" id="afterCnn">-</div></div>
      <div class="row"><div class="key">재질 그룹</div><div class="val" id="materialGroup">-</div></div>
      <div class="row"><div class="key">재질 근거</div><div class="val" id="materialReason">-</div></div>
      <div class="row"><div class="key">OCR 텍스트</div><div class="val" id="ocrPreview">-</div></div>
    </section>

    <section class="panel">
      <div style="font-weight:900;margin-bottom:10px">반응 요약</div>
      <pre id="reaction">-</pre>
    </section>
  </section>

  <section class="panel">
    <div style="font-weight:900;margin-bottom:10px">로그</div>
    <div id="logBox" class="log"></div>
  </section>
</div>

<script>
const KEY = 'stain_dev_state_v1';
function render(){
  let data = {};
  try { data = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { data = {}; }
  const a = data.latestAnalysis || {};
  document.getElementById('stageBadge').textContent = data.stage || '-';
  document.getElementById('tagModeBadge').textContent = data.tagMode || '-';
  document.getElementById('tagShotBadge').textContent = data.hasTagImage ? '완료' : '없음';
  document.getElementById('beforeShotBadge').textContent = data.hasBeforeImage ? '완료' : '없음';
  document.getElementById('afterShotBadge').textContent = data.hasAfterImage ? '완료' : '없음';
  document.getElementById('feedbackShotBadge').textContent = data.hasFeedbackImage ? '완료' : '없음';

  document.getElementById('finalLabel').textContent = a.final_label ? `${a.final_label_kr} (${a.final_label})` : '-';
  document.getElementById('decisionSource').textContent = a.decision_source || '-';
  document.getElementById('confidence').textContent = a.confidence != null ? `${(Number(a.confidence) * 100).toFixed(1)}%` : '-';
  document.getElementById('beforeCnn').textContent = a.cnn_before_class ? `${a.cnn_before_class} / ${(Number(a.cnn_before_confidence) * 100).toFixed(1)}%` : '-';
  document.getElementById('afterCnn').textContent = a.cnn_after_class ? `${a.cnn_after_class} / ${(Number(a.cnn_after_confidence) * 100).toFixed(1)}%` : '-';
  document.getElementById('materialGroup').textContent = a.material_group_display || a.material_group || '-';
  document.getElementById('materialReason').textContent = a.material_reason || '-';
  document.getElementById('ocrPreview').textContent = (a.ocr_text_preview || []).join(' | ') || '-';
  document.getElementById('reaction').textContent = a.reaction_summary ? JSON.stringify(a.reaction_summary, null, 2) : '-';

  const logBox = document.getElementById('logBox');
  logBox.innerHTML = '';
  (data.logs || []).forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-item';
    div.textContent = line;
    logBox.appendChild(div);
  });
}
document.getElementById('refreshBtn').addEventListener('click', render);
window.addEventListener('storage', render);
render();
</script>
</body>
</html>
